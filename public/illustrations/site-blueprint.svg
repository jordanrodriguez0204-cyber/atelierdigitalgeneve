<svg viewBox="0 0 680 480" xmlns="http://www.w3.org/2000/svg" role="img" style="font-family: 'Fraunces', 'Iowan Old Style', Cambria, Georgia, serif;">
  <title>Plan d'architecte d'un site — Atelier Digital Genève</title>
  <desc>Représentation technique d'une page web en style blueprint : cotes, croix de repérage, sections numérotées 01 à 04, watermark serif en hero, et cartouche d'atelier en bas à droite avec planche n°01, échelle 1:50 et référence ADG/GE.</desc>

  <!-- COTE TOP — 1440 px -->
  <g stroke="#7B1616" stroke-width="0.5" fill="none">
    <line x1="60" y1="25" x2="270" y2="25"/>
    <line x1="410" y1="25" x2="620" y2="25"/>
    <line x1="60" y1="20" x2="60" y2="30"/>
    <line x1="620" y1="20" x2="620" y2="30"/>
  </g>
  <text x="340" y="29" text-anchor="middle" fill="#7B1616" font-size="11" font-style="italic">1440 px</text>

  <!-- COTE RIGHT — hauteurs des sections -->
  <g stroke="#7B1616" stroke-width="0.5" fill="none">
    <line x1="635" y1="55" x2="643" y2="55"/>
    <line x1="635" y1="85" x2="643" y2="85"/>
    <line x1="639" y1="55" x2="639" y2="85"/>
    <line x1="635" y1="90" x2="643" y2="90"/>
    <line x1="635" y1="220" x2="643" y2="220"/>
    <line x1="639" y1="90" x2="639" y2="220"/>
    <line x1="635" y1="225" x2="643" y2="225"/>
    <line x1="635" y1="305" x2="643" y2="305"/>
    <line x1="639" y1="225" x2="639" y2="305"/>
    <line x1="635" y1="310" x2="643" y2="310"/>
    <line x1="635" y1="365" x2="643" y2="365"/>
    <line x1="639" y1="310" x2="639" y2="365"/>
  </g>
  <text x="650" y="74" fill="#7B1616" font-size="9" font-style="italic">60h</text>
  <text x="650" y="159" fill="#7B1616" font-size="9" font-style="italic">h. variable</text>
  <text x="650" y="269" fill="#7B1616" font-size="9" font-style="italic">200h</text>
  <text x="650" y="341" fill="#7B1616" font-size="9" font-style="italic">320h</text>

  <!-- AXE CENTRAL pointillé -->
  <line x1="340" y1="45" x2="340" y2="372" stroke="#7B1616" stroke-width="0.4" stroke-dasharray="2 3" opacity="0.35"/>

  <!-- 01 NAVBAR -->
  <rect x="60" y="55" width="560" height="30" fill="#FAFAF8" stroke="#0C0B09" stroke-width="0.5"/>
  <text x="74" y="74" fill="#7B1616" font-size="13" font-weight="600">ADG</text>
  <line x1="488" y1="70" x2="510" y2="70" stroke="#0C0B09" stroke-width="0.5"/>
  <line x1="522" y1="70" x2="554" y2="70" stroke="#0C0B09" stroke-width="0.5"/>
  <line x1="566" y1="70" x2="600" y2="70" stroke="#0C0B09" stroke-width="0.5"/>
  <text x="68" y="50" fill="#7B1616" font-size="8" font-style="italic">Sect. 01 — Navbar</text>

  <!-- 02 HERO -->
  <rect x="60" y="90" width="560" height="130" fill="#FFFFFF" stroke="#0C0B09" stroke-width="0.5"/>
  <!-- Watermark A -->
  <text x="555" y="200" text-anchor="middle" fill="#7B1616" font-size="160" font-weight="700" opacity="0.07">A</text>
  <!-- H1 placeholder -->
  <line x1="78" y1="128" x2="380" y2="128" stroke="#0C0B09" stroke-width="3"/>
  <line x1="78" y1="146" x2="320" y2="146" stroke="#0C0B09" stroke-width="3"/>
  <line x1="78" y1="164" x2="240" y2="164" stroke="#0C0B09" stroke-width="3"/>
  <line x1="241" y1="164" x2="252" y2="164" stroke="#7B1616" stroke-width="3"/>
  <!-- Subtitle lines -->
  <line x1="78" y1="183" x2="270" y2="183" stroke="#0C0B09" stroke-width="0.5" opacity="0.4"/>
  <line x1="78" y1="191" x2="230" y2="191" stroke="#0C0B09" stroke-width="0.5" opacity="0.4"/>
  <!-- CTA button -->
  <rect x="78" y="200" width="86" height="14" rx="7" fill="#0C0B09"/>
  <text x="68" y="103" fill="#7B1616" font-size="8" font-style="italic">Sect. 02 — Hero éditorial</text>
  <text x="612" y="103" text-anchor="end" fill="#0C0B09" font-size="7" font-style="italic" opacity="0.55">— DOC. 2026.05</text>

  <!-- 03 CARDS row -->
  <rect x="60" y="225" width="560" height="80" fill="#FAFAF8" stroke="#0C0B09" stroke-width="0.5"/>
  <rect x="80" y="240" width="160" height="55" fill="#FFFFFF" stroke="#0C0B09" stroke-width="0.5"/>
  <rect x="255" y="240" width="160" height="55" fill="#FFFFFF" stroke="#0C0B09" stroke-width="0.5"/>
  <rect x="430" y="240" width="160" height="55" fill="#FFFFFF" stroke="#0C0B09" stroke-width="0.5"/>
  <g>
    <line x1="95" y1="253" x2="115" y2="253" stroke="#7B1616" stroke-width="1.5"/>
    <line x1="95" y1="263" x2="220" y2="263" stroke="#0C0B09" stroke-width="1.2"/>
    <line x1="95" y1="273" x2="190" y2="273" stroke="#0C0B09" stroke-width="0.5" opacity="0.45"/>
    <line x1="95" y1="281" x2="170" y2="281" stroke="#0C0B09" stroke-width="0.5" opacity="0.45"/>
  </g>
  <g>
    <line x1="270" y1="253" x2="290" y2="253" stroke="#7B1616" stroke-width="1.5"/>
    <line x1="270" y1="263" x2="395" y2="263" stroke="#0C0B09" stroke-width="1.2"/>
    <line x1="270" y1="273" x2="365" y2="273" stroke="#0C0B09" stroke-width="0.5" opacity="0.45"/>
    <line x1="270" y1="281" x2="345" y2="281" stroke="#0C0B09" stroke-width="0.5" opacity="0.45"/>
  </g>
  <g>
    <line x1="445" y1="253" x2="465" y2="253" stroke="#7B1616" stroke-width="1.5"/>
    <line x1="445" y1="263" x2="570" y2="263" stroke="#0C0B09" stroke-width="1.2"/>
    <line x1="445" y1="273" x2="540" y2="273" stroke="#0C0B09" stroke-width="0.5" opacity="0.45"/>
    <line x1="445" y1="281" x2="520" y2="281" stroke="#0C0B09" stroke-width="0.5" opacity="0.45"/>
  </g>
  <text x="68" y="238" fill="#7B1616" font-size="8" font-style="italic">Sect. 03 — Sections (3 col.)</text>

  <!-- 04 FOOTER -->
  <rect x="60" y="310" width="560" height="55" fill="#0C0B09" stroke="#0C0B09" stroke-width="0.5"/>
  <text x="78" y="332" fill="#E8B4B4" font-size="11" font-style="italic" opacity="0.85">Atelier Digital</text>
  <line x1="78" y1="345" x2="180" y2="345" stroke="#FFFFFF" stroke-width="0.5" opacity="0.3"/>
  <line x1="78" y1="354" x2="150" y2="354" stroke="#FFFFFF" stroke-width="0.5" opacity="0.3"/>
  <line x1="240" y1="345" x2="340" y2="345" stroke="#FFFFFF" stroke-width="0.5" opacity="0.3"/>
  <line x1="240" y1="354" x2="310" y2="354" stroke="#FFFFFF" stroke-width="0.5" opacity="0.3"/>
  <line x1="400" y1="345" x2="500" y2="345" stroke="#FFFFFF" stroke-width="0.5" opacity="0.3"/>
  <line x1="400" y1="354" x2="470" y2="354" stroke="#FFFFFF" stroke-width="0.5" opacity="0.3"/>
  <text x="612" y="332" text-anchor="end" fill="#FFFFFF" font-size="8" font-style="italic" opacity="0.5">Sect. 04 — Footer</text>

  <!-- TRIM MARKS aux 4 coins du wireframe -->
  <g stroke="#7B1616" stroke-width="0.6" fill="none">
    <line x1="48" y1="55" x2="72" y2="55"/><line x1="60" y1="43" x2="60" y2="67"/>
    <line x1="608" y1="55" x2="632" y2="55"/><line x1="620" y1="43" x2="620" y2="67"/>
    <line x1="48" y1="365" x2="72" y2="365"/><line x1="60" y1="353" x2="60" y2="377"/>
    <line x1="608" y1="365" x2="632" y2="365"/><line x1="620" y1="353" x2="620" y2="377"/>
  </g>

  <!-- CALLOUTS — leader lines + cercles + texte -->
  <line x1="620" y1="120" x2="660" y2="115" stroke="#7B1616" stroke-width="0.4" stroke-dasharray="1 2"/>
  <circle cx="620" cy="120" r="1.5" fill="#7B1616"/>
  <text x="662" y="118" fill="#7B1616" font-size="8" font-style="italic">hairline 0.5px</text>

  <line x1="555" y1="160" x2="600" y2="245" stroke="#7B1616" stroke-width="0.4" stroke-dasharray="1 2"/>
  <circle cx="555" cy="160" r="1.5" fill="#7B1616"/>
  <text x="602" y="248" fill="#7B1616" font-size="8" font-style="italic">watermark · opacité 7%</text>

  <!-- FOLIO bas gauche -->
  <text x="30" y="455" fill="#7B1616" font-size="9" font-style="italic">Pl. 01 · ADG/GE — Édition 2026</text>

  <!-- CARTOUCHE bas droite -->
  <g stroke="#0C0B09" stroke-width="0.5" fill="none">
    <rect x="410" y="395" width="220" height="65" fill="#FFFFFF"/>
    <line x1="410" y1="412" x2="630" y2="412"/>
    <line x1="410" y1="440" x2="630" y2="440"/>
    <line x1="500" y1="395" x2="500" y2="412"/>
  </g>
  <text x="420" y="407" fill="#7B1616" font-size="11" font-style="italic" font-weight="500">Pl. 01</text>
  <text x="510" y="407" fill="#0C0B09" font-size="9" font-style="italic">échelle 1:50</text>
  <text x="420" y="429" fill="#0C0B09" font-size="11" font-weight="600">Architecture d'un site</text>
  <text x="420" y="454" fill="#0C0B09" font-size="8" font-style="italic">Atelier Digital Genève · Mai 2026</text>
  <text x="620" y="454" text-anchor="end" fill="#7B1616" font-size="8" font-style="italic">N° 2026.05</text>

  <!-- Carré accent en haut à droite du cartouche -->
  <rect x="624" y="399" width="3" height="3" fill="#7B1616"/>
</svg>
